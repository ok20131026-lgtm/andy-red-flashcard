<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Andy RED Vol.2 단어 암기 카드</title>
  <style>
    :root{--red:#e53935;--red2:#ffebee;--ink:#241b1b;--muted:#756b6b;--bg:#fff8f8;--panel:#fff;--line:#ffd3d3;--good:#178a44;--bad:#d32f2f;--shadow:0 14px 30px rgba(126,24,24,.14)}
    [data-theme="dark"]{--red:#ff6b6b;--red2:#3a1818;--ink:#fff3f3;--muted:#d8b9b9;--bg:#170f12;--panel:#241719;--line:#5b2929;--shadow:0 14px 30px rgba(0,0,0,.35)}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--ink)}
    button{font:inherit;border:0;border-radius:18px;padding:14px 18px;cursor:pointer;font-weight:800;background:var(--red2);color:var(--ink);min-height:50px}button:hover{filter:brightness(.98)}button.primary{background:var(--red);color:white}.small{font-size:.9rem;padding:9px 12px;min-height:40px}.ghost{background:transparent;border:2px solid var(--line)}
    header{position:sticky;top:0;z-index:5;display:flex;gap:12px;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--panel);box-shadow:var(--shadow)}h1{font-size:clamp(1.25rem,3.5vw,2rem);margin:0;color:var(--red)}
    .layout{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 78px)}aside{padding:18px;background:var(--panel);border-right:1px solid var(--line);overflow:auto}.content{padding:22px;max-width:1050px;width:100%;margin:auto}.top-actions{display:flex;gap:8px;flex-wrap:wrap}.mode-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 0 18px}.mode-tabs button.active,.set-btn.active{background:var(--red);color:white}
    .set-list{display:grid;gap:10px}.set-btn{text-align:left;display:block;width:100%;background:var(--bg);border:2px solid var(--line)}.set-title{font-weight:900}.meta{color:var(--muted);font-size:.92rem;margin-top:5px}.bar{height:9px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;background:var(--red);width:0%}
    .panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:24px}.hero-card{min-height:330px;display:grid;place-items:center;text-align:center;transition:.2s;user-select:none}.word{font-size:clamp(2.8rem,10vw,6rem);font-weight:1000}.meaning{font-size:clamp(2.4rem,9vw,5.2rem);font-weight:1000;color:var(--red)}.pos{font-size:1.35rem;color:var(--muted);font-weight:900}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.between{justify-content:space-between}.center{justify-content:center;text-align:center}.stats{margin:14px 0;color:var(--muted);font-weight:800}.options{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}.option{background:var(--panel);border:3px solid var(--line);min-height:120px}.choice-content{display:flex;align-items:center;justify-content:center;gap:10px}.choice-word{font-size:clamp(1.9rem,5vw,3.2rem);font-weight:1000}.choice-speak-button{font-size:.9rem;padding:7px 10px;min-height:38px;min-width:auto}.correct{border-color:var(--good)!important;background:#e8f7ee!important;color:var(--good)!important}.wrong{border-color:var(--bad)!important;background:#ffebee!important;color:var(--bad)!important}.feedback{font-size:1.6rem;font-weight:1000;margin:16px 0}.letters{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.letter{font-size:1.7rem;min-width:58px;min-height:54px;width:auto;flex:0 0 auto}.answer{min-height:75px;border:3px dashed var(--line);border-radius:20px;display:flex;gap:8px;justify-content:center;align-items:center;font-size:2rem;font-weight:1000;margin:16px 0;white-space:pre}.review-list{display:grid;gap:8px;margin-top:12px}.hidden{display:none!important}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:7}.sharebox{margin-top:16px}.card-face{display:grid;justify-items:center;gap:16px}.memorize-actions{margin-top:16px}
    @media(max-width:800px){.layout{display:block}aside{position:fixed;inset:0 18% 0 0;z-index:8;transform:translateX(-110%);transition:.2s;box-shadow:var(--shadow)}aside.open{transform:none}.overlay.show{display:block}.content{padding:14px}.options,.mode-tabs{grid-template-columns:1fr}button{width:100%;font-size:1.08rem}.top-actions button{width:auto}.hero-card{min-height:360px}.letter{min-width:64px;min-height:58px}.desktop-only{display:none}}
    @media(max-width:640px){header{padding:10px 12px;gap:8px}h1{font-size:1.05rem}.top-actions{gap:6px}.panel,.card{border-radius:22px;padding:18px 14px}.hero-card{min-height:240px;padding:24px 16px;margin:10px 0 12px}.word{font-size:clamp(40px,12vw,60px);line-height:1.05}.meaning{font-size:clamp(34px,10vw,52px);line-height:1.08}.card-face{gap:16px}.pos{font-size:1.05rem}.stats{margin:8px 0 10px;font-size:.92rem}.memorize-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.memorize-actions button{width:100%;min-height:44px;padding:9px 10px;font-size:16px}.options{gap:10px;margin-top:14px}.option{min-height:86px;padding:14px 12px}.choice-content{gap:10px}.choice-word{font-size:clamp(30px,7vw,46px);font-weight:1000;line-height:1.05}.choice-speak-button{font-size:13px;padding:6px 9px;min-height:34px;min-width:auto;width:auto}.letters{display:flex;flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:center;gap:10px}.letter{min-width:48px;min-height:48px;font-size:22px;padding:8px 10px;width:auto;flex:0 0 auto}.answer{min-height:58px;margin:12px 0;font-size:1.6rem}}
  </style>
</head>
<body>
<header><div class="row"><button id="menuBtn" class="small ghost">☰</button><h1>Andy RED Vol.2 단어 암기 카드</h1></div><div class="top-actions"><button id="themeBtn" class="small ghost">🌙</button><button id="copyBtn" class="small ghost">링크 복사</button></div></header>
<div id="overlay" class="overlay"></div><div class="layout"><aside id="sidebar"><h2>Unit-Day 선택</h2><div id="setList" class="set-list"></div></aside><main class="content"><div class="mode-tabs"><button data-mode="memorize" class="active">1단계 외우기</button><button data-mode="choice">2단계 뜻 보고 고르기</button><button data-mode="spell">3단계 알파벳 조립</button></div><section id="app" class="panel">불러오는 중...</section><section class="panel sharebox hidden" id="shareBox"><b>공유</b><p id="shareMsg"></p></section></main></div>
<script>
const PUBLIC_URL='__PUBLIC_URL__';
const $=s=>document.querySelector(s), app=$('#app'); let sets=[], current=0, mode='memorize', state={};
function safeStore(){for(const s of [localStorage,sessionStorage]){try{s.setItem('__t','1');s.removeItem('__t');return s}catch{}}let m={};return{getItem:k=>m[k]||null,setItem:(k,v)=>m[k]=v,removeItem:k=>delete m[k]}} const store=safeStore();
const PROGRESS_KEY='andy-red-flashcard-clean-progress';
function progress(){try{return JSON.parse(store.getItem(PROGRESS_KEY)||'{}')}catch{return {}}}
function saveProgress(p){store.setItem(PROGRESS_KEY,JSON.stringify(p))}
function setProgress(){const all=progress(); const id=sets[current]?.id; if(!id)return {known:[],review:[]}; return all[id] || {known:[],review:[]}}
function saveSetProgress(p){const all=progress(); const id=sets[current]?.id; if(!id)return; all[id]={known:[...(p.known||[])],review:[...(p.review||[])]}; saveProgress(all)}
const load=setProgress, save=saveSetProgress;
function normText(v){return String(v||'').replace(/\s+/g,' ').trim()}
function escapeHtml(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function jsArg(v){return String(v??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/[\r\n]+/g,' ')}
function normalize(data){return (data.sets||[]).map((set,si)=>{const setId=normText(set.setId)||`set-${si+1}`; const words=(set.words||[]).map((w,wi)=>{const word=normText(w.word); return {id:`${setId}-${w.number ?? wi+1}-${word}`, number:w.number ?? wi+1, word, meaningKo:normText(w.meaningKo), partOfSpeechKo:normText(w.partOfSpeechKo), speakText:normText(w.speakText)||word};}).filter(x=>x.word&&x.meaningKo); return {id:setId, title:normText(set.title)||`Set ${si+1}`, words};})}
function pct(s){const p=(progress()[s.id])||{known:[]};return s.words.length?Math.round((p.known||[]).length/s.words.length*100):0}
function renderSets(){setList.innerHTML=sets.map((s,i)=>`<button class="set-btn ${i===current?'active':''}" onclick="selectSet(${i})"><div class="set-title">${escapeHtml(s.title)}</div><div class="meta">${s.words.length}개 단어 · 진행률 ${pct(s)}%</div><div class="bar"><span style="width:${pct(s)}%"></span></div></button>`).join('')}
function selectSet(i){current=i; resetMode(); renderSets(); render(); sidebar.classList.remove('open'); overlay.classList.remove('show')} function resetMode(){state={i:0,flip:false,answered:false,score:0,wrong:[],pool:null,chosen:null,letters:[],selected:[],done:false}}
function speak(t,e){e?.stopPropagation(); if(!speechSynthesis)return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=.85; speechSynthesis.speak(u)}
function addReview(w){let p=load(); if(!p.review.includes(w.id))p.review.push(w.id); save(p); renderSets()} function know(w){let p=load(); if(!p.known.includes(w.id))p.known.push(w.id); p.review=(p.review||[]).filter(id=>id!==w.id); save(p); renderSets()}
function pool(){return state.pool || (Array.isArray(sets[current]?.words) ? sets[current].words : [])} function word(){return pool()[state.i] || null}
function render(){ if(!sets.length){app.textContent='데이터가 없습니다.';return} if(!pool().length || !word()){app.textContent='학습할 단어가 없습니다.';return} if(mode==='memorize')mem(); else if(mode==='choice')choice(); else spell(); }
function mem(){const w=word(), p=load(); app.innerHTML=`<div class="stats row between"><span>카드 ${state.i+1} / ${pool().length}</span><span>외운 카드 ${p.known.length} · 다시 볼 카드 ${(p.review||[]).length}</span></div><div class="hero-card card" onclick="state.flip=!state.flip;render()">${state.flip?`<div class="card-face"><div class="meaning">${escapeHtml(w.meaningKo)}</div><div class="word" style="font-size:2.2rem">${escapeHtml(w.word)}</div><div class="pos">${escapeHtml(w.partOfSpeechKo)}</div><button class="primary" onclick="speak('${jsArg(w.speakText)}',event)">🔊 발음 듣기</button></div>`:`<div class="card-face"><div class="word">${escapeHtml(w.word)}</div><button class="primary" onclick="speak('${jsArg(w.speakText)}',event)">🔊 발음 듣기</button></div>`}</div><div class="row center memorize-actions"><button onclick="state.i=Math.max(0,state.i-1);state.flip=false;render()">이전 카드</button><button onclick="state.i=Math.min(pool().length-1,state.i+1);state.flip=false;render()">다음 카드</button><button class="primary" onclick="know(word());state.i=Math.min(pool().length-1,state.i+1);state.flip=false;render()">외웠어요</button><button onclick="addReview(word());state.i=Math.min(pool().length-1,state.i+1);state.flip=false;render()">다시 볼래요</button></div>${reviewPanel()}`}
function choices(w){let other=pool().filter(x=>x.id!==w.id); let bad=other[Math.floor(Math.random()*other.length)]||w; return [w,bad].sort(()=>Math.random()-.5)}
function choice(){if(state.done)return done('choice'); const w=word(); if(!state.opts)state.opts=choices(w); app.innerHTML=`<div class="stats">문제 ${state.i+1} / ${pool().length}</div><div class="center"><div class="meaning">${escapeHtml(w.meaningKo)}</div><div class="pos">${escapeHtml(w.partOfSpeechKo)}</div></div><div class="options">${state.opts.map(o=>`<div class="option ${state.answered?(o.id===w.id?'correct':(state.chosen===o.id?'wrong':'')):''}" onclick="pick('${jsArg(o.id)}')" role="button" tabindex="0"><div class="choice-content"><span class="choice-word">${escapeHtml(o.word)}</span><button class="small choice-speak-button" onclick="speak('${jsArg(o.speakText)}',event)">🔊</button></div></div>`).join('')}</div><div class="feedback">${state.answered?(state.chosen===w.id?'정답입니다!':`아쉬워요. 정답은 ${escapeHtml(w.word)}입니다.`):''}</div><button class="primary" onclick="nextQuiz()">다음 문제</button>${reviewPanel()}`}
function pick(id){if(state.answered)return; state.answered=true; state.chosen=id; if(id===word().id)state.score++; else{state.wrong.push(word()); addReview(word())} render()} function nextQuiz(){if(!state.answered)return; if(state.i>=pool().length-1)state.done=true; else{state.i++;state.answered=false;state.chosen=null;state.opts=null} render()}
function clean(s){return String(s||'').toLowerCase().normalize('NFKD').replace(/[\s\-'’`]/g,'').replace(/[^a-z]/g,'')} function pattern(s, sel=''){let j=0; return s.replace(/\s+/g,' ').trim().split('').map(c=>/[a-z]/i.test(c)?(sel[j++]||'_'):c).join(' ')}
function makeLetters(w){return clean(w.word).split('').map((c,i)=>({c,i})).sort(()=>Math.random()-.5)}
function spell(){if(state.done)return done('spell'); const w=word(); if(!state.letters.length)state.letters=makeLetters(w); const ans=state.selected.map(x=>x.c).join(''); app.innerHTML=`<div class="stats">카드 ${state.i+1} / ${pool().length}</div><div class="center"><div class="row center"><div class="meaning">${escapeHtml(w.meaningKo)}</div><button class="small choice-speak-button" onclick="speak('${jsArg(w.speakText)}',event)">🔊</button></div><div class="pos">${escapeHtml(w.partOfSpeechKo)}</div></div><div class="answer">${pattern(w.word, ans)}</div><div class="letters">${state.letters.map(l=>`<button class="letter" ${state.selected.find(x=>x.i===l.i)||state.answered?'disabled':''} onclick="state.selected.push({c:'${l.c}',i:${l.i}});render()">${l.c}</button>`).join('')}</div><div class="row center" style="margin-top:16px"><button onclick="state.selected.pop();render()">지우기</button><button onclick="state.selected=[];render()">초기화</button><button class="primary" onclick="checkSpell()">정답 확인</button><button onclick="nextSpell()">다음 카드</button></div><div class="feedback ${state.answered?(state.ok?'correct':'wrong'):''}">${state.answered?(state.ok?'정답입니다!':`아쉬워요. 정답은 ${escapeHtml(w.word)}입니다.`):''}</div>${reviewPanel()}`}
function checkSpell(){if(state.answered)return; state.answered=true; state.ok=state.selected.map(x=>x.c).join('')===clean(word().word); if(state.ok)state.score++; else{state.wrong.push(word());addReview(word())} render()} function nextSpell(){if(!state.answered)return; if(state.i>=pool().length-1)state.done=true; else{state.i++;state.answered=false;state.ok=false;state.selected=[];state.letters=[]} render()}
function done(kind){const total=pool().length, rate=total?Math.round(state.score/total*100):0, wrong=[...new Map(state.wrong.map(w=>[w.id,w])).values()]; app.innerHTML=`<div class="center"><h2>완료!</h2><p class="feedback">정답 ${state.score} · 오답 ${wrong.length} · 정답률 ${rate}%</p><div class="review-list">${wrong.map(w=>`<div>${escapeHtml(w.word)} - ${escapeHtml(w.meaningKo)}</div>`).join('')||'틀린 단어가 없어요!'}</div><button class="primary" onclick="retryWrong('${kind}')">틀린 단어만 다시 ${kind==='choice'?'풀기':'조립하기'}</button><button onclick="resetMode();render()">전체 다시 시작</button></div>${reviewPanel()}`}
function retryWrong(k){const wrongOnly=[...new Map(state.wrong.map(w=>[w.id,w])).values()]; if(!wrongOnly.length)return; mode=k; document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===k)); resetMode(); state.pool=wrongOnly; render()}
function reviewPanel(){const p=load(), r=sets[current].words.filter(w=>(p.review||[]).includes(w.id)); return `<div class="panel" style="margin-top:18px"><h3>다시 볼 카드 (${r.length})</h3><div class="review-list">${r.map(w=>`<div class="row between"><b>${escapeHtml(w.word)}</b><span>${escapeHtml(w.meaningKo)}</span><button class="small primary" onclick="know(sets[current].words.find(x=>x.id==='${jsArg(w.id)}'));render()">외웠어요</button></div>`).join('')||'<span class="meta">아직 없습니다.</span>'}</div></div>`}
async function init(){const data=await fetch('quizData.json').then(r=>r.json()); sets=normalize(data); renderSets(); render()} init().catch(e=>app.textContent='quizData.json 파싱 오류: '+e.message);
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x===b));resetMode();render()});
menuBtn.onclick=()=>{sidebar.classList.add('open');overlay.classList.add('show')}; overlay.onclick=()=>{sidebar.classList.remove('open');overlay.classList.remove('show')}; themeBtn.onclick=()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'':'dark'};
function shareUrl(){return PUBLIC_URL || location.href} copyBtn.onclick=async()=>{await navigator.clipboard.writeText(shareUrl()); shareBox.classList.remove('hidden'); shareMsg.textContent='링크를 복사했어요.'};
</script>
</body>
</html>

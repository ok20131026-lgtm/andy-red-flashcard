  <style>
    :root{--red:#e53935;--red2:#ffebee;--ink:#241b1b;--muted:#756b6b;--bg:#fff8f8;--panel:#fff;--line:#ffd3d3;--good:#178a44;--bad:#d32f2f;--shadow:0 14px 30px rgba(126,24,24,.14)}
    [data-theme="dark"]{--red:#ff6b6b;--red2:#3a1818;--ink:#fff3f3;--muted:#d8b9b9;--bg:#170f12;--panel:#241719;--line:#5b2929;--shadow:0 14px 30px rgba(0,0,0,.35)}
    *{box-sizing:border-box;touch-action:manipulation}html,body{touch-action:manipulation;-webkit-text-size-adjust:100%;overscroll-behavior:contain}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--ink)}
    button{font:inherit;border:0;border-radius:18px;padding:12px 16px;cursor:pointer;font-weight:800;background:var(--red2);color:var(--ink);min-height:50px;font-size:16px}button:disabled{opacity:.45;cursor:not-allowed}button:hover:not(:disabled){filter:brightness(.98)}button.primary{background:var(--red);color:white}.small{font-size:16px;padding:8px 11px;min-height:40px}.ghost{background:transparent;border:2px solid var(--line)}
    header{position:sticky;top:0;z-index:5;display:flex;gap:8px;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--panel);box-shadow:var(--shadow)}h1{font-size:clamp(1.05rem,3.2vw,1.8rem);margin:0;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.05;letter-spacing:-.04em}.layout{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 60px)}aside{padding:18px;background:var(--panel);border-right:1px solid var(--line);overflow:auto}.content{padding:14px 22px;max-width:1050px;width:100%;margin:auto}.top-actions,.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.between{justify-content:space-between}.center{justify-content:center;text-align:center}.mode-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0 10px}.mode-tabs button{padding:10px 8px;min-height:42px}.mode-tabs button.active,.set-btn.active{background:var(--red);color:white}.set-list{display:grid;gap:10px}.set-btn{text-align:left;display:block;width:100%;background:var(--bg);border:2px solid var(--line)}.set-title{font-weight:900}.meta{color:var(--muted);font-size:.92rem;margin-top:5px}.bar{height:9px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;background:var(--red);width:0%}
    .panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:20px}.unit-title{text-align:center;color:var(--muted);font-weight:900;font-size:.98rem;margin:0 0 4px}.hero-card{min-height:250px;display:grid;place-items:center;text-align:center;transition:.2s;user-select:none;border:2px dashed rgba(239,68,68,.45);background:#fffafa}.word{font-size:clamp(2.8rem,10vw,6rem);font-weight:1000}.meaning{font-size:clamp(2.4rem,9vw,5.2rem);font-weight:1000;color:var(--red);line-height:1.05}.pos{font-size:1.25rem;color:var(--muted);font-weight:900}.stats{margin:10px 0;color:var(--muted);font-weight:800}.score-board{display:grid;gap:6px;margin:0 0 12px;color:var(--muted);font-weight:800}.question-card{border:2px dashed rgba(239,68,68,.45);border-radius:24px;background:#fffafa;padding:22px 16px;margin:10px 0 14px}.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.option{background:#ffecec;border:1.5px solid #ffc4c4;box-shadow:0 10px 24px rgba(239,68,68,.12);min-height:100px;border-radius:20px}.option:hover{background:#ffdede}.choice-content{display:flex;align-items:center;justify-content:center;gap:10px}.choice-word{font-size:clamp(1.9rem,5vw,3.2rem);font-weight:1000}.choice-speak-button{font-size:16px;padding:0;min-height:38px;min-width:38px;width:38px}.correct{border-color:var(--good)!important;background:#e7f8ed!important;color:var(--good)!important}.wrong{border-color:var(--bad)!important;background:#ffe8e8!important;color:var(--bad)!important}.feedback{font-size:1.35rem;font-weight:1000;margin:12px 0;min-height:32px}.letters{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;align-items:center}.letter{font-size:1.55rem;min-width:54px;min-height:52px;width:auto;flex:0 0 auto}.answer{min-height:64px;border:3px dashed var(--line);border-radius:20px;display:flex;gap:8px;justify-content:center;align-items:center;font-size:1.8rem;font-weight:1000;margin:12px 0;white-space:pre}.review-list{display:grid;gap:8px;margin-top:10px}.hidden{display:none!important}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:7}.sharebox{margin-top:16px}.card-face{display:grid;justify-items:center;gap:14px}.memorize-actions,.quiz-nav-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.quiz-nav-actions button,.memorize-actions button{width:100%;min-height:52px;padding:12px 18px;font-size:16px;border-radius:18px}.review-actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    @media(max-width:800px){.layout{display:block}aside{position:fixed;inset:0 18% 0 0;z-index:8;transform:translateX(-110%);transition:.2s;box-shadow:var(--shadow)}aside.open{transform:none}.overlay.show{display:block}.content{padding:10px 12px}.top-actions button{width:auto}.desktop-only{display:none}.options{grid-template-columns:1fr}}
    @media(max-width:640px){header{padding:7px 8px;gap:6px}.row{gap:5px;min-width:0}h1{font-size:clamp(15px,4.15vw,18px);letter-spacing:-.06em;max-width:calc(100vw - 190px)}.top-actions{gap:4px;flex-wrap:nowrap}.small{padding:6px 8px;min-height:36px}.content{padding:8px}.panel,.card{border-radius:20px;padding:12px 10px}.unit-title{font-size:.86rem;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}.mode-tabs{gap:6px;margin:6px 0 8px}.mode-tabs button{min-height:38px;padding:7px 4px}.score-board{font-size:.86rem;margin-bottom:8px}.hero-card{min-height:170px;padding:22px 16px;margin:10px 0 12px}.card-face{min-height:126px;padding:0;gap:12px;align-content:center}.word{font-size:clamp(34px,10vw,52px);line-height:1.05}.meaning{font-size:clamp(38px,10vw,56px);line-height:1.05;margin-bottom:6px}.pos{font-size:22px;margin-bottom:8px}.stats{margin:6px 0 8px;font-size:.92rem}.memorize-actions{grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.memorize-actions button{min-height:44px;padding:9px 10px}.question-card{padding:18px 12px;margin:8px 0 10px;min-height:auto}.options{gap:10px;margin-top:10px}.option{min-height:82px;padding:14px 12px;border-radius:20px}.choice-word{font-size:clamp(28px,7vw,42px);line-height:1.05}.choice-speak-button{width:34px;height:34px;min-width:34px;font-size:15px}.quiz-nav-actions{margin-top:10px}.letters{flex-direction:row;gap:8px}.letter{min-width:44px;min-height:44px;font-size:20px;padding:7px 9px}.answer{min-height:54px;margin:10px 0;font-size:1.45rem}.feedback{font-size:1.08rem;margin:8px 0;min-height:26px}}
  </style>
</head>
<body>
<header><div class="row"><button id="menuBtn" class="small ghost">☰</button><h1>Andy RED Vol.2 단어 암기 카드</h1></div><div class="top-actions"><button id="themeBtn" class="small ghost">🌙</button><button id="copyBtn" class="small ghost">링크 복사</button></div></header>
<div id="overlay" class="overlay"></div><div class="layout"><aside id="sidebar"><h2>Unit-Day 선택</h2><div id="setList" class="set-list"></div></aside><main class="content"><div class="unit-title" id="unitTitle"></div><div class="mode-tabs"><button data-mode="memorize" class="active">1단계</button><button data-mode="choice">2단계</button><button data-mode="spell">3단계</button></div><section id="app" class="panel">불러오는 중...</section><section class="panel sharebox hidden" id="shareBox"><b>공유</b><p id="shareMsg"></p></section></main></div>
<script>
const PUBLIC_URL='__PUBLIC_URL__';
const $=s=>document.querySelector(s), app=$('#app'); let sets=[], current=0, mode='memorize', state={}, cachedVoices=[], audioCtx=null, autoNextTimer=null;
function safeStore(){for(const s of [localStorage,sessionStorage]){try{s.setItem('__t','1');s.removeItem('__t');return s}catch{}}let m={};return{getItem:k=>m[k]||null,setItem:(k,v)=>m[k]=v,removeItem:k=>delete m[k]}} const store=safeStore();
const PROGRESS_KEY='andy-red-flashcard-clean-progress', SCORE_KEY='andy-red-flashcard-stage-scores', REVIEW_KEY='andy-red-flashcard-stage-review';
function json(key,fb={}){try{return JSON.parse(store.getItem(key)||JSON.stringify(fb))}catch{return fb}} function put(key,v){store.setItem(key,JSON.stringify(v))}
function normText(v){return String(v||'').replace(/\s+/g,' ').trim()} function escapeHtml(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))} function jsArg(v){return String(v??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/[\r\n]+/g,' ')}
function normalize(data){return (data.sets||[]).map((set,si)=>{const setId=normText(set.setId)||`set-${si+1}`; const words=(set.words||[]).map((w,wi)=>{const word=normText(w.word); return {id:`${setId}-${w.number ?? wi+1}-${word}`, number:w.number ?? wi+1, word, meaningKo:normText(w.meaningKo), partOfSpeechKo:normText(w.partOfSpeechKo), speakText:normText(w.speakText)||word};}).filter(x=>x.word&&x.meaningKo); return {id:setId, title:normText(set.title)||`Set ${si+1}`, words};})}
function progress(){return json(PROGRESS_KEY,{})} function saveProgress(p){put(PROGRESS_KEY,p)} function setProgress(){const id=sets[current]?.id; return (progress()[id])||{known:[],review:[]}} function saveSetProgress(p){const all=progress(), id=sets[current]?.id; if(!id)return; all[id]={known:[...(p.known||[])],review:[...(p.review||[])]}; saveProgress(all)}
function scoreAll(){return json(SCORE_KEY,{})} function reviewAll(){return json(REVIEW_KEY,{})} function ensureSet(obj,setId){obj[setId] ||= {memorize:{},choice:{},spell:{}}; return obj[setId]} function pctNum(a,b){return b?Math.round(a/b*100):0}
function stageScore(stage){const all=scoreAll(), set=sets[current]; const rec=all[set?.id]?.[stage]; if(!rec||!rec.total)return '아직 기록 없음'; return `${rec.correct} / ${rec.total}개 · ${pctNum(rec.correct,rec.total)}%`} function saveStageScore(stage,correct,total){const all=scoreAll(), slot=ensureSet(all,sets[current].id); slot[stage]={correct,total,updatedAt:Date.now()}; put(SCORE_KEY,all)}
function reviewIds(stage){const all=reviewAll(); return all[sets[current]?.id]?.[stage]?.ids||[]} function saveReviewIds(stage,ids){const all=reviewAll(), slot=ensureSet(all,sets[current].id); slot[stage]={ids:[...new Set(ids)],updatedAt:Date.now()}; put(REVIEW_KEY,all)} function addStageReview(stage,w){saveReviewIds(stage,[...reviewIds(stage),w.id])} function removeStageReview(stage,w){saveReviewIds(stage,reviewIds(stage).filter(id=>id!==w.id))}
function pct(s){const p=(progress()[s.id])||{known:[]};return s.words.length?Math.round((p.known||[]).length/s.words.length*100):0}
function renderSets(){setList.innerHTML=sets.map((s,i)=>`<button class="set-btn ${i===current?'active':''}" onclick="selectSet(${i})"><div class="set-title">${escapeHtml(s.title)}</div><div class="meta">${s.words.length}개 단어 · 진행률 ${pct(s)}%</div><div class="bar"><span style="width:${pct(s)}%"></span></div></button>`).join('')}
function resetMode(){clearAutoNext();state={i:0,flip:false,pool:null,review:false,per:{},lettersBy:{},done:false}} function selectSet(i){current=i; resetMode(); renderSets(); render(); sidebar.classList.remove('open'); overlay.classList.remove('show')} function pool(){return state.pool || sets[current]?.words || []} function word(){return pool()[state.i]||null}
function updateUnit(){unitTitle.textContent=sets[current]?.title||''} function scoreBoard(){return `<div class="score-board"><div>1단계 점수: ${stageScore('memorize')}</div><div>2단계 점수: ${stageScore('choice')}</div><div>3단계 점수: ${stageScore('spell')}</div></div>`}
function loadVoices(){try{cachedVoices=speechSynthesis.getVoices()||[]}catch{cachedVoices=[]}} if('speechSynthesis' in window){loadVoices(); speechSynthesis.onvoiceschanged=loadVoices}
function bestVoice(){return cachedVoices.find(v=>v.lang==='en-US')||cachedVoices.find(v=>v.lang?.startsWith('en'))||cachedVoices.find(v=>/English/i.test(v.name))||null}
function speakWord(text,e,retry=false){e?.stopPropagation(); try{if(!('speechSynthesis' in window))throw Error('no speech'); loadVoices(); speechSynthesis.cancel(); setTimeout(()=>{try{const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=.85; const v=bestVoice(); if(v)u.voice=v; u.onerror=()=>{if(!retry)speakWord(text,e,true); else showSpeechHelp()}; speechSynthesis.speak(u)}catch{if(!retry)speakWord(text,e,true); else showSpeechHelp()}},70)}catch{showSpeechHelp()}}
function showSpeechHelp(){shareBox.classList.remove('hidden'); shareMsg.textContent='발음 재생이 안 되면 Chrome 브라우저에서 다시 열어 주세요.'}
function playTone(ok){try{audioCtx ||= new (window.AudioContext||window.webkitAudioContext)(); audioCtx.resume?.(); const now=audioCtx.currentTime; const seq=ok?[660,880]:[220]; seq.forEach((f,i)=>{const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.frequency.value=f; o.type=ok?'sine':'square'; o.connect(g); g.connect(audioCtx.destination); const t=now+i*.16; g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.16,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.14); o.start(t); o.stop(t+.16)})}catch{}}
function addReview(w){let p=setProgress(); if(!p.review.includes(w.id))p.review.push(w.id); saveSetProgress(p); addStageReview('memorize',w); renderSets()} function know(w){let p=setProgress(); if(!p.known.includes(w.id))p.known.push(w.id); p.review=(p.review||[]).filter(id=>id!==w.id); saveSetProgress(p); removeStageReview('memorize',w); saveStageScore('memorize',p.known.length,sets[current].words.length); renderSets()}
function render(){updateUnit(); if(!sets.length){app.textContent='데이터가 없습니다.';return} if(!pool().length||!word()){app.innerHTML=scoreBoard()+'<p class="meta">복습할 카드 없음</p>'+reviewPanel();return} if(mode==='memorize')mem(); else if(mode==='choice')choice(); else spell()}
function mem(){const w=word(), p=setProgress(); app.innerHTML=`${scoreBoard()}<div class="stats row between"><span>카드 ${state.i+1} / ${pool().length}</span></div><div class="hero-card card" onclick="state.flip=!state.flip;render()">${state.flip?`<div class="card-face"><div class="meaning">${escapeHtml(w.meaningKo)}</div><div class="word" style="font-size:2.2rem">${escapeHtml(w.word)}</div><div class="pos">${escapeHtml(w.partOfSpeechKo)}</div><button class="primary" onclick="speakWord('${jsArg(w.speakText)}',event)">🔊 발음 듣기</button></div>`:`<div class="card-face"><div class="word">${escapeHtml(w.word)}</div><button class="primary" onclick="speakWord('${jsArg(w.speakText)}',event)">🔊 발음 듣기</button></div>`}</div><div class="stats row between"><span>외운 카드 ${p.known.length}</span><span>다시 볼 카드 ${(p.review||[]).length}</span></div><div class="memorize-actions"><button onclick="state.i=Math.max(0,state.i-1);state.flip=false;render()">이전 카드</button><button onclick="state.i=Math.min(pool().length-1,state.i+1);state.flip=false;render()">다음 카드</button><button class="primary" onclick="know(word());state.i=Math.min(pool().length-1,state.i+1);state.flip=false;render()">외웠어요</button><button onclick="addReview(word());state.i=Math.min(pool().length-1,state.i+1);state.flip=false;render()">다시 볼래요</button></div>${reviewPanel()}`}
function rec(){const w=word(); state.per[w.id] ||= {selectedWord:null,isAnswered:false,isCorrect:false,firstAnswered:false,resultMessage:'',opts:choices(w),selectedLetters:[],selectedLetterIds:[],firstChecked:false,firstResultCorrect:false,letters:null}; return state.per[w.id]}
function choices(w){let other=sets[current].words.filter(x=>x.id!==w.id); let bad=other[Math.floor(Math.random()*other.length)]||w; return [w,bad].sort(()=>Math.random()-.5)}
function choice(){if(state.done)return done('choice'); const w=word(), r=rec(); app.innerHTML=`${scoreBoard()}<div class="stats">문제 ${state.i+1} / ${pool().length}${state.review?' · 오답 복습':''}</div><div class="question-card center"><div class="meaning">${escapeHtml(w.meaningKo)}</div><div class="pos">${escapeHtml(w.partOfSpeechKo)}</div></div><div class="options">${r.opts.map(o=>`<div class="option ${r.isAnswered?(o.id===w.id?'correct':(r.selectedWord===o.id?'wrong':'')):''}" onclick="pick('${jsArg(o.id)}')" role="button" tabindex="0"><div class="choice-content"><span class="choice-word">${escapeHtml(o.word)}</span><button class="small choice-speak-button" onclick="speakWord('${jsArg(o.speakText)}',event)">🔊</button></div></div>`).join('')}</div><div class="feedback">${escapeHtml(r.resultMessage)}</div><div class="quiz-nav-actions"><button onclick="prevQuestion()" ${state.i===0?'disabled':''}>이전 문제</button><button class="primary" onclick="nextQuestion()">다음 문제</button></div>${reviewPanel()}`}
function pick(id){const r=rec(), w=word(); if(r.isAnswered)return; r.selectedWord=id; r.isAnswered=true; r.firstAnswered=true; r.isCorrect=id===w.id; r.resultMessage=r.isCorrect?'정답입니다!':`아쉬워요. 정답은 ${w.word}입니다.`; if(r.isCorrect)removeStageReview('choice',w); else addStageReview('choice',w); updateQuizScore('choice'); render()} function updateQuizScore(stage){const correct=Object.values(state.per).filter(r=>stage==='spell'?r.firstResultCorrect:(r.isAnswered&&r.isCorrect)).length; saveStageScore(stage,correct,pool().length)}
function prevQuestion(){clearAutoNext(); state.i=Math.max(0,state.i-1); render()} function nextQuestion(){clearAutoNext(); if(state.i>=pool().length-1)state.done=true; else state.i++; render()}
function clean(s){return String(s||'').toLowerCase().normalize('NFKD').replace(/[\s\-'’`]/g,'').replace(/[^a-z]/g,'')} function pattern(s, sel=''){let j=0; return s.replace(/\s+/g,' ').trim().split('').map(c=>/[a-z]/i.test(c)?(sel[j++]||'_'):c).join(' ')} function makeLetters(w){return clean(w.word).split('').map((c,i)=>({c,i})).sort(()=>Math.random()-.5)}
function spell(){if(state.done)return done('spell'); const w=word(), r=rec(); if(!r.letters)r.letters=makeLetters(w); const ans=r.selectedLetters.join(''); app.innerHTML=`${scoreBoard()}<div class="stats">카드 ${state.i+1} / ${pool().length}${state.review?' · 오답 복습':''}</div><div class="question-card center"><div class="row center"><div class="meaning">${escapeHtml(w.meaningKo)}</div><button class="small choice-speak-button" onclick="speakWord('${jsArg(w.speakText)}',event)">🔊</button></div><div class="pos">${escapeHtml(w.partOfSpeechKo)}</div></div><div class="answer">${pattern(w.word,ans)}</div><div class="letters">${r.letters.map(l=>`<button class="letter" ${r.selectedLetterIds.includes(l.i)||r.isCorrect?'disabled':''} onclick="pickLetter('${l.c}',${l.i})">${l.c}</button>`).join('')}</div><div class="quiz-nav-actions"><button onclick="prevQuestion()" ${state.i===0?'disabled':''}>이전 문제</button><button class="primary" onclick="nextQuestion()">다음 문제</button></div><div class="row center" style="margin-top:10px"><button onclick="eraseLetter()">지우기</button><button onclick="clearLetters()">초기화</button></div><div class="feedback ${r.isAnswered?(r.isCorrect?'correct':'wrong'):''}">${escapeHtml(r.resultMessage)}</div>${reviewPanel()}`}
function pickLetter(c,i){const r=rec(); if(r.isCorrect)return; r.selectedLetters.push(c); r.selectedLetterIds.push(i); r.resultMessage=''; if(r.selectedLetters.length===clean(word().word).length)checkSpellAuto(); else render()} function checkSpellAuto(){const r=rec(), w=word(); const ok=r.selectedLetters.join('')===clean(w.word); r.isAnswered=true; r.isCorrect=ok; if(!r.firstChecked){r.firstResultCorrect=ok;r.firstChecked=true;} r.resultMessage=ok?'정답입니다!':'아쉬워요. 다시 조립해 보세요.'; if(ok){removeStageReview('spell',w); playTone(true); updateQuizScore('spell'); clearAutoNext(); autoNextTimer=setTimeout(()=>nextQuestion(),750)} else {addStageReview('spell',w); playTone(false); updateQuizScore('spell')} render()}
function eraseLetter(){const r=rec(); if(r.isCorrect)return; r.selectedLetters.pop(); r.selectedLetterIds.pop(); if(!r.isCorrect){r.isAnswered=false;r.resultMessage=''} render()} function clearLetters(){const r=rec(); if(r.isCorrect)return; r.selectedLetters=[]; r.selectedLetterIds=[]; r.isAnswered=false; r.resultMessage=''; render()} function clearAutoNext(){if(autoNextTimer){clearTimeout(autoNextTimer);autoNextTimer=null}}
function done(kind){const total=pool().length, correct=Object.values(state.per).filter(r=>kind==='spell'?r.firstResultCorrect:(r.isAnswered&&r.isCorrect)).length, rate=pctNum(correct,total), wrong=pool().filter(w=>reviewIds(kind).includes(w.id)); app.innerHTML=`${scoreBoard()}<div class="center"><h2>완료!</h2><p class="feedback">정답 ${correct} / ${total} · 정답률 ${rate}%</p><div class="review-list">${wrong.map(w=>`<div>${escapeHtml(w.word)} - ${escapeHtml(w.meaningKo)}</div>`).join('')||'오답 없음'}</div><button class="primary" onclick="startStageReview('${kind}')">${kind==='choice'?'2단계 오답만 다시 풀기':'3단계 오답만 다시 조립하기'}</button><button onclick="resetMode();render()">전체 문제로 돌아가기</button></div>${reviewPanel()}`}
function startStageReview(stage){const ids=reviewIds(stage), words=sets[current].words.filter(w=>ids.includes(w.id)); if(!words.length){app.innerHTML=scoreBoard()+'<p class="meta">오답 없음</p>'+reviewPanel();return} mode=stage; document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===stage)); resetMode(); state.pool=words; state.review=true; render()}
function reviewPanel(){const mem=sets[current].words.filter(w=>reviewIds('memorize').includes(w.id)), c=reviewIds('choice').length, sp=reviewIds('spell').length; return `<div class="panel" style="margin-top:14px"><h3>단계별 복습</h3><div class="review-actions"><button onclick="startMemReview()">1단계 다시 볼 카드 복습 (${mem.length})</button><button onclick="startStageReview('choice')">2단계 오답만 다시 풀기 (${c})</button><button onclick="startStageReview('spell')">3단계 오답만 다시 조립하기 (${sp})</button><button onclick="resetAllResults()">결과 초기화</button>${state.review?'<button class="primary" onclick="resetMode();render()">전체 문제로 돌아가기</button>':''}</div><div class="review-list">${mem.map(w=>`<div class="row between"><b>${escapeHtml(w.word)}</b><span>${escapeHtml(w.meaningKo)}</span><button class="small primary" onclick="know(sets[current].words.find(x=>x.id==='${jsArg(w.id)}'));render()">외웠어요</button></div>`).join('')||'<span class="meta">복습할 카드 없음</span>'}</div></div>`}
function startMemReview(){const words=sets[current].words.filter(w=>reviewIds('memorize').includes(w.id)); if(!words.length){app.innerHTML=scoreBoard()+'<p class="meta">복습할 카드 없음</p>'+reviewPanel();return} mode='memorize'; document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode==='memorize')); resetMode(); state.pool=words; state.review=true; render()} function resetAllResults(){const scores=scoreAll(), reviews=reviewAll(), prog=progress(); delete scores[sets[current].id]; delete reviews[sets[current].id]; delete prog[sets[current].id]; put(SCORE_KEY,scores); put(REVIEW_KEY,reviews); saveProgress(prog); resetMode(); renderSets(); render()}
async function init(){const data=await fetch('quizData.json').then(r=>r.json()); sets=normalize(data); renderSets(); render()} init().catch(e=>app.textContent='quizData.json 파싱 오류: '+e.message);
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x===b));resetMode();render()});
menuBtn.onclick=()=>{sidebar.classList.add('open');overlay.classList.add('show')}; overlay.onclick=()=>{sidebar.classList.remove('open');overlay.classList.remove('show')}; themeBtn.onclick=()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'':'dark'};
function shareUrl(){return PUBLIC_URL || location.href} copyBtn.onclick=async()=>{await navigator.clipboard.writeText(shareUrl()); shareBox.classList.remove('hidden'); shareMsg.textContent='링크를 복사했어요.'};
</script>
</body>
